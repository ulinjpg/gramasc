name: Telegram Member Migration

on:
  workflow_dispatch:
    inputs:
      source_group:
        description: '-1003755166377'
        required: true
        type: string
      target_group:
        description: '-1001548920792'
        required: true
        type: string
      batch_size:
        description: '50'
        required: false
        default: '50'
        type: string
      delay_seconds:
        description: '7'
        required: false
        default: '2'
        type: string
  schedule:
    - cron: '0 2 * * 0'

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
  TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
  TELEGRAM_PHONE: ${{ secrets.TELEGRAM_PHONE }}

jobs:
  migrate-members:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install telethon python-telegram-bot==20.8

    - name: Run member migration
      env:
        SOURCE_GROUP: ${{ github.event.inputs.source_group || vars.DEFAULT_SOURCE_GROUP }}
        TARGET_GROUP: ${{ github.event.inputs.target_group || vars.DEFAULT_TARGET_GROUP }}
        BATCH_SIZE: ${{ github.event.inputs.batch_size || '50' }}
        DELAY_SECONDS: ${{ github.event.inputs.delay_seconds || '2' }}
      run: python scripts/migrate_members.py

    - name: Upload migration log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: migration-log-${{ github.run_id }}
        path: migration_log.json
        retention-days: 7
